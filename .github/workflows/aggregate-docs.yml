name: Aggregate Docs

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [docs-updated]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Aggregate docs from source repos
        env:
          GITHUB_TOKEN: ${{ secrets.DOCS_AGGREGATE_TOKEN }}
          CMBAYS_PAT: ${{ secrets.CMBAYS_PAT }}
        run: |
          set -euo pipefail

          # Save base repo files from main before switching branches
          cp docs.json /tmp/base-docs.json
          cp introduction.mdx /tmp/base-introduction.mdx
          cp -r images /tmp/base-images
          cp -r breezy-bays-labs /tmp/base-breezy-bays-labs

          # Clone source repos
          git clone --depth=1 https://github.com/cmbays/mokumo.git /tmp/mokumo
          git clone --depth=1 https://github.com/cmbays/kata.git /tmp/kata
          git clone --depth=1 "https://x-access-token:${CMBAYS_PAT}@github.com/cmbays/soji.git" /tmp/soji
          git clone --depth=1 "https://x-access-token:${CMBAYS_PAT}@github.com/cmbays/tankyu.git" /tmp/tankyu
          git clone --depth=1 "https://x-access-token:${CMBAYS_PAT}@github.com/cmbays/renshin.git" /tmp/renshin

          # Prepare the docs branch
          git fetch origin docs 2>/dev/null && git checkout docs || git checkout -b docs

          # Restore base files from main
          cp /tmp/base-docs.json docs.json
          cp /tmp/base-introduction.mdx introduction.mdx
          cp -r /tmp/base-images/. images/
          cp -r /tmp/base-breezy-bays-labs/. breezy-bays-labs/

          # Clean existing aggregated content
          rm -rf mokumo kata soji tankyu renshin

          # Copy mokumo docs (from docs-site/ subdirectory)
          cp -r /tmp/mokumo/docs-site mokumo

          # Resolve symlinks — mokumo uses symlinks to docs/ outside docs-site/
          find mokumo -type l | while read link; do
            target=$(readlink -f "/tmp/mokumo/docs-site/$(echo "$link" | sed 's|^mokumo/||')" 2>/dev/null || true)
            if [ -f "$target" ]; then
              rm "$link"
              cp "$target" "$link"
            fi
          done

          # Remove mokumo's local docs.json (we use the base repo's config)
          rm -f mokumo/docs.json mokumo/mint.json

          # Copy kata docs (from docs-site/ subdirectory)
          cp -r /tmp/kata/docs-site kata

          # Resolve symlinks — kata uses symlinks to docs/ and skill/ outside docs-site/
          find kata -type l | while read link; do
            target=$(readlink -f "/tmp/kata/docs-site/$(echo "$link" | sed 's|^kata/||')" 2>/dev/null || true)
            if [ -f "$target" ]; then
              rm "$link"
              cp "$target" "$link"
            fi
          done

          # Remove kata's local docs.json (we use the base repo's config)
          rm -f kata/docs.json kata/mint.json

          # --- Soji ---
          mkdir -p soji
          cp -r /tmp/soji/docs soji/

          # --- Tankyu ---
          mkdir -p tankyu
          cp -r /tmp/tankyu/docs tankyu/

          # --- Renshin ---
          mkdir -p renshin
          cp -r /tmp/renshin/docs renshin/

          echo "=== Aggregated structure ==="
          find . -maxdepth 3 -not -path './.git/*' -not -path './node_modules/*' | head -60 || true

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.DOCS_AGGREGATE_TOKEN }}
        run: |
          set -euo pipefail

          git add -A
          if git diff --cached --quiet; then
            echo "No changes detected, skipping push."
            exit 0
          fi

          git config user.name "Docs Bot"
          git config user.email "docs-bot@breezybayslabs.com"
          git commit -m "docs: aggregate from source repos ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Push using the PAT for authentication
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/breezy-bays-labs/docs.git"
          git push origin docs
